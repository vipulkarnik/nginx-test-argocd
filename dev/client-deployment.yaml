apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-deployment
  labels:
    component: web
spec: 
  replicas: 1
  selector:
    matchLabels:
      component: web
  template:
    metadata:
      labels:
        component: web
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
            - containerPort: 443
