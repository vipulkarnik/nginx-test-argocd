apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-deployment
  labels:
    component: web
spec: 
  replicas: 1
  selector:
    matchLabels:
      component: web
  template:
    metadata:
      labels:
        component: web
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
            - containerPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: my-nodeport-service
spec:
  type: NodePort
  selector:
    component: web       # Matches the label of your Pods
  ports:
    - port: 80         # Internal Service port (within the cluster)
      targetPort: 8080 # Port your application is listening on in the Pod
      nodePort: 30007  # Optional: Fixed port for external access (30000-32767)
      protocol: TCP
